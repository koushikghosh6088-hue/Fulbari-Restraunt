name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Standalone Application
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: npm run build

      - name: Prepare Standalone Bundle
        run: |
          mkdir deploy_bundle
          cp -r .next/standalone/* deploy_bundle/
          cp -r public deploy_bundle/
          mkdir -p deploy_bundle/.next
          cp -r .next/static deploy_bundle/.next/

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_bundle/
          server-dir: ./domains/fulbarirestora.in/public_html/fulbari-app/bundle/
          # Optional: Clean the server directory before upload
          # delete-removed: true
